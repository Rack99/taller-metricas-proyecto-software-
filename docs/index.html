<script>
  const labels = {
    total_issues: "Total de tareas",
    closed_issues: "Tareas cerradas",
    open_issues: "Tareas abiertas",
    completion_rate_percent: "Avance (%)",
    total_bugs: "Bugs totales",
    open_bugs: "Bugs abiertos",
    average_resolution_hours: "Tiempo promedio de resolución (h)",
    estimated_hours: "Horas estimadas",
    actual_hours: "Horas reales",
    estimated_cost_usd: "Costo estimado (USD)",
    actual_cost_usd: "Costo real (USD)",
    cost_variance_usd: "Variación de costo (USD)",
    roi_percent: "ROI (%)",
    velocity_story_points: "Velocity",
    overdue_open_issues: "Tareas vencidas",
    risk_level: "Nivel de riesgo"
  };

  fetch("metrics.json")
    .then(response => {
      if (!response.ok) {
        throw new Error("No se pudo cargar metrics.json");
      }
      return response.json();
    })
    .then(data => {
      const container = document.getElementById("metrics");

      Object.entries(labels).forEach(([key, label]) => {
        const card = document.createElement("div");
        card.className = "card";
        card.innerHTML = `
          <div>${label}</div>
          <div class="value">${data[key] ?? "N/A"}</div>
        `;
        container.appendChild(card);
      });
    })
    .catch(error => {
      document.getElementById("metrics").innerHTML =
        `<p>Error cargando métricas: ${error.message}</p>`;
    });
</script>
